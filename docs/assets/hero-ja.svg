<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2f8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="buzzg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="maing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#1e293b" flood-opacity="0.14"/>
    </filter>
    <marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1280" height="600" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="6" fill="url(#accent)"/>

  <!-- Title -->
  <text x="64" y="78" fill="#0f172a" font-size="44" font-weight="800">quiz-ai &#9889;</text>
  <text x="290" y="78" fill="#1e293b" font-size="30" font-weight="700">早押しクイズ特化型LLMシステム</text>
  <text x="64" y="116" fill="#64748b" font-size="20">人間 vs AI をハンデなしの同条件で対戦・日本語特化</text>

  <!-- params badge -->
  <rect x="980" y="44" width="236" height="44" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
  <circle cx="1006" cy="66" r="7" fill="#22c55e"/>
  <text x="1022" y="73" fill="#334155" font-size="18" font-weight="600">≤ 32B params (27.2B)</text>

  <!-- Input: char stream -->
  <g filter="url(#sh)">
    <rect x="64" y="180" width="250" height="240" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
  </g>
  <text x="84" y="214" fill="#2563eb" font-size="15" font-weight="700">問題文（文字ストリーム）</text>
  <text x="84" y="252" fill="#1e293b" font-size="19">日本の首都は</text>
  <text x="84" y="284" fill="#1e293b" font-size="19">東京ですが、</text>
  <text x="84" y="316" fill="#94a3b8" font-size="19">アメリカの…</text>
  <rect x="84" y="344" width="210" height="2" fill="#e2e8f0"/>
  <text x="84" y="378" fill="#64748b" font-size="15">STT: parakeet-tdt-ctc (CTC)</text>
  <text x="84" y="400" fill="#64748b" font-size="15">22 文字/秒 で開示</text>

  <!-- arrow -->
  <path d="M322 300 H378" stroke="#94a3b8" stroke-width="3" marker-end="url(#a)"/>

  <!-- Buzz model -->
  <g filter="url(#sh)">
    <rect x="386" y="150" width="420" height="150" rx="16" fill="url(#buzzg)"/>
  </g>
  <text x="410" y="186" fill="#dbeafe" font-size="15" font-weight="700">割り込みモデル · バズ判定</text>
  <text x="410" y="222" fill="#fff" font-size="22" font-weight="800">LFM2.5-1.2B + 回帰ヘッド</text>
  <text x="410" y="256" fill="#eff6ff" font-size="17">毎文字を採点 → conf ≥ θ で押す</text>
  <text x="410" y="284" fill="#bfdbfe" font-size="15">~9 ms / char · MAE 8.6 文字</text>

  <!-- Main model -->
  <g filter="url(#sh)">
    <rect x="386" y="320" width="420" height="150" rx="16" fill="url(#maing)"/>
  </g>
  <text x="410" y="356" fill="#fee2e2" font-size="15" font-weight="700">メインLLM · 回答</text>
  <text x="410" y="392" fill="#fff" font-size="22" font-weight="800">gemma-4-26B-A4B (MoE) SFT</text>
  <text x="410" y="426" fill="#fff1f2" font-size="17">部分問題文から &lt;think&gt;…&lt;/think&gt; 推論 → 回答</text>
  <text x="410" y="454" fill="#fecaca" font-size="15">全文QA 76% · prefix ~74%（θ調整）</text>

  <!-- parallel brace text -->
  <text x="596" y="316" fill="#94a3b8" font-size="14" text-anchor="middle">並行・非同期（投機推論）</text>

  <!-- arrows to output -->
  <path d="M806 225 H862" stroke="#94a3b8" stroke-width="3" marker-end="url(#a)"/>
  <path d="M806 395 H862" stroke="#94a3b8" stroke-width="3" marker-end="url(#a)"/>

  <!-- Output -->
  <g filter="url(#sh)">
    <rect x="870" y="150" width="346" height="320" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
  </g>
  <text x="892" y="186" fill="#059669" font-size="16" font-weight="700">バズ &amp; スコア</text>
  <rect x="892" y="206" width="300" height="64" rx="12" fill="#ecfdf5" stroke="#10b981"/>
  <text x="912" y="246" fill="#047857" font-size="22" font-weight="800">早いほど高得点</text>
  <text x="892" y="304" fill="#0f172a" font-size="20" font-weight="700">score = 1.0 + 0.5·(1 − buzzFrac)</text>
  <text x="892" y="334" fill="#64748b" font-size="16">誤答 = −1.5（早押しのリスク）</text>
  <rect x="892" y="356" width="300" height="2" fill="#e2e8f0"/>
  <text x="892" y="392" fill="#334155" font-size="16">TTS: Irodori-TTS（問題読み上げ）</text>
  <text x="892" y="420" fill="#334155" font-size="16">UI: React Big Screen on Gradio</text>
  <text x="892" y="448" fill="#334155" font-size="16">デプロイ: HF Space · ZeroGPU</text>

  <!-- footer chips -->
  <g font-size="15" font-weight="600">
    <rect x="64" y="500" width="170" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="84" y="525" fill="#334155">2モデルをFT</text>
    <rect x="250" y="500" width="186" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="270" y="525" fill="#334155">Reasoning &lt;think&gt;</text>
    <rect x="452" y="500" width="244" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="472" y="525" fill="#334155">クイズ文法を学習 (S-buzz)</text>
    <rect x="712" y="500" width="170" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="732" y="525" fill="#334155">日本特化 / 日本語</text>
    <rect x="898" y="500" width="288" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="918" y="525" fill="#334155">HF Build Small Hackathon</text>
  </g>
</svg>
